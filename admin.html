<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Burger Bing</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* تنسيق خاص للأدمن */
        .admin-login {
            max-width: 400px;
            margin: 80px auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .admin-dashboard {
            display: none;
        }
        .admin-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 30px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: #ff6b00;
            color: black;
        }
        .tab-content {
            display: none;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
        }
        .tab-content.active {
            display: block;
        }
        .admin-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .products-table, .orders-table {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: white;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            text-align: right;
        }
        button.small-btn {
            padding: 5px 10px;
            margin: 2px;
            font-size: 12px;
        }
        .dark-mode-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #ff6b00;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div id="admin-root">
    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="admin-login">
        <h2 style="text-align:center">🔐 دخول الأدمن</h2>
        <input type="text" id="adminUsername" placeholder="اسم المستخدم" class="form-input">
        <input type="password" id="adminPassword" placeholder="كلمة المرور" class="form-input">
        <button id="loginBtn" class="btn-primary" style="width:100%">دخول</button>
        <div id="loginError" style="color:red; margin-top:10px"></div>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboard" class="admin-dashboard">
        <div class="container">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h1>لوحة تحكم Burger Bing</h1>
                <button id="logoutBtn" class="btn-secondary">تسجيل الخروج</button>
            </div>
            <div class="admin-tabs" id="adminTabs">
                <button class="tab-btn active" data-tab="products">المنتجات</button>
                <button class="tab-btn" data-tab="categories">الأقسام</button>
                <button class="tab-btn" data-tab="orders">الطلبات</button>
                <button class="tab-btn" data-tab="locations">المحافظات والمدن</button>
                <button class="tab-btn" data-tab="stats">الإحصائيات</button>
                <button class="tab-btn" data-tab="settings">الإعدادات</button>
                <button class="tab-btn" data-tab="backup">النسخ الاحتياطي</button>
                <button class="tab-btn" data-tab="exports">تصدير الطلبات</button>
            </div>
            <div id="tabProducts" class="tab-content active">جاري التحميل...</div>
            <div id="tabCategories" class="tab-content">جاري التحميل...</div>
            <div id="tabOrders" class="tab-content">جاري التحميل...</div>
            <div id="tabLocations" class="tab-content">جاري التحميل...</div>
            <div id="tabStats" class="tab-content">جاري التحميل...</div>
            <div id="tabSettings" class="tab-content">جاري التحميل...</div>
            <div id="tabBackup" class="tab-content">جاري التحميل...</div>
            <div id="tabExports" class="tab-content">جاري التحميل...</div>
        </div>
        <button id="darkModeToggleAdmin" class="dark-mode-toggle"><i class="fas fa-moon"></i></button>
    </div>
</div>
<script src="admin.js"></script>
</body>
</html>
