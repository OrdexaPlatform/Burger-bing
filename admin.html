<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بيرجر بينق - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #f1f5f9; transition: 0.3s; }
        body.dark { background: #121212; color: #eee; }
        .login-container {
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(135deg, #111, #ff6b00);
        }
        .login-card {
            background: rgba(255,255,255,0.15); backdrop-filter: blur(12px);
            padding: 2rem; border-radius: 32px; width: 350px; color: white;
        }
        .login-card input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 40px; border: none;
        }
        .dashboard { display: none; padding: 20px; }
        .dashboard.active { display: block; }
        .navbar-admin { display: flex; justify-content: space-between; background: #1e293b; padding: 15px 30px; border-radius: 40px; margin-bottom: 25px; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 28px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; }
        body.dark .stat-card { background: #1e293b; color: white; }
        .section { background: white; border-radius: 28px; padding: 20px; margin-bottom: 30px; }
        body.dark .section { background: #1e293b; }
        button, .btn {
            background: #ff6b00; border: none; padding: 8px 16px; border-radius: 40px;
            color: white; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { transform: scale(0.97); background: #e55a00; }
        input, select, textarea { padding: 8px 12px; border-radius: 40px; border: 1px solid #ccc; margin: 5px 0; width: 100%; }
        .product-item, .order-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding: 12px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: right; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: 1fr; } }
        .toggle-dark { background: #334155; }
    </style>
</head>
<body>

<div class="login-container" id="loginContainer">
    <div class="login-card">
        <h2>🔐 دخول الأدمن</h2>
        <input type="text" id="adminUsername" placeholder="اسم المستخدم">
        <input type="password" id="adminPassword" placeholder="كلمة المرور">
        <button id="loginBtn">دخول</button>
    </div>
</div>

<div class="dashboard" id="dashboardContainer">
    <div class="navbar-admin">
        <h2>🍔 لوحة تحكم بيرجر بينق</h2>
        <div>
            <button class="toggle-dark" id="darkModeToggle">🌙 الوضع المظلم</button>
            <button id="logoutBtn">تسجيل خروج</button>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-shopping-cart"></i><h3>الطلبات</h3><span id="ordersCount">0</span></div>
        <div class="stat-card"><i class="fas fa-dollar-sign"></i><h3>إجمالي المبيعات</h3><span id="totalSales">0</span> ج.م</div>
        <div class="stat-card"><i class="fas fa-users"></i><h3>العملاء</h3><span id="customersCount">0</span></div>
        <div class="stat-card"><i class="fas fa-fire"></i><h3>الأكثر مبيعاً</h3><span id="topProduct">-</span></div>
    </div>

    <!-- Tabs -->
    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
        <button class="tab-btn active" data-tab="products">📦 إدارة المنتجات</button>
        <button class="tab-btn" data-tab="orders">📋 الطلبات</button>
        <button class="tab-btn" data-tab="sections">🏷️ الأقسام</button>
        <button class="tab-btn" data-tab="shipping">🚚 الشحن والمحافظات</button>
        <button class="tab-btn" data-tab="settings">⚙️ الإعدادات</button>
        <button class="tab-btn" data-tab="backup">💾 نسخة احتياطية</button>
    </div>

    <!-- Products Tab -->
    <div id="productsTab" class="section tab-content active">
        <h3>➕ إضافة منتج جديد</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 10px;">
            <input type="text" id="prodName" placeholder="اسم المنتج">
            <input type="text" id="prodDesc" placeholder="وصف">
            <input type="number" id="prodPrice" placeholder="سعر">
            <select id="prodSection"></select>
            <input type="file" id="prodImage" accept="image/*">
            <button id="addProductBtn">إضافة</button>
        </div>
        <h3>📋 قائمة المنتجات</h3>
        <div id="productsList"></div>
    </div>

    <!-- Orders Tab -->
    <div id="ordersTab" class="section tab-content">
        <h3>جميع الطلبات</h3>
        <div id="ordersList"></div>
        <button id="deleteAllOrdersBtn" style="background:red;">🗑️ حذف جميع الطلبات</button>
    </div>

    <!-- Sections Tab -->
    <div id="sectionsTab" class="section tab-content">
        <h3>إدارة الأقسام</h3>
        <div style="display: flex; gap:10px;"><input type="text" id="newSectionName" placeholder="اسم قسم جديد"><button id="addSectionBtn">إضافة قسم</button></div>
        <div id="sectionsList"></div>
    </div>

    <!-- Shipping Tab -->
    <div id="shippingTab" class="section tab-content">
        <h3>المحافظات والمدن وأسعار الشحن</h3>
        <div id="shippingEditor"></div>
        <button id="saveShippingBtn">حفظ التغييرات</button>
    </div>

    <!-- Settings Tab -->
    <div id="settingsTab" class="section tab-content">
        <h3>إعدادات الموقع</h3>
        <label>اسم المطعم:</label><input type="text" id="storeNameInput">
        <label>الضريبة (%):</label><input type="number" id="taxRateInput">
        <label>شعار الموقع:</label><input type="file" id="logoUpload">
        <button id="saveSettingsBtn">حفظ</button>
        <h3>تغيير بيانات الدخول</h3>
        <input type="text" id="newAdminUser" placeholder="اسم مستخدم جديد">
        <input type="password" id="newAdminPass" placeholder="كلمة مرور جديدة">
        <button id="updateCredentialsBtn">تحديث</button>
    </div>

    <!-- Backup Tab -->
    <div id="backupTab" class="section tab-content">
        <h3>نسخة احتياطية واستعادة</h3>
        <button id="exportExcelBtn">📊 تصدير Excel (الطلبات)</button>
        <button id="exportPdfBtn">📄 تصدير PDF (الطلبات)</button>
        <button id="backupDataBtn">💾 نسخ جميع البيانات</button>
        <input type="file" id="restoreFileInput" accept=".json">
        <button id="restoreDataBtn">🔄 استعادة من نسخة</button>
    </div>
</div>

<script>
    // Data models
    let products = [], sections = [], orders = [], shippingData = {}, settings = {}, adminCred = { username: "admin", password: "200300" };
    let currentTab = "products";

    function loadAll() {
        products = JSON.parse(localStorage.getItem('bb_products') || '[]');
        sections = JSON.parse(localStorage.getItem('bb_sections') || '["البرجر","الساندوتشات","الوجبات","البطاطس","المقبلات","المشروبات","الصوصات","الحلويات"]');
        orders = JSON.parse(localStorage.getItem('bb_orders') || '[]');
        shippingData = JSON.parse(localStorage.getItem('bb_shipping') || `{"governorates":[{"id":"gov1","name":"القاهرة","cities":[{"id":"cit1","name":"مدينة نصر","shippingCost":30},{"id":"cit2","name":"مصر الجديدة","shippingCost":35}]},{"id":"gov2","name":"الإسكندرية","cities":[{"id":"cit3","name":"وسط","shippingCost":45}]}]}`);
        settings = JSON.parse(localStorage.getItem('bb_settings') || '{"storeName":"Burger Bing","taxRate":14}');
        let cred = localStorage.getItem('bb_admin_cred');
        if(cred) adminCred = JSON.parse(cred);
        updateStats();
        renderProducts();
        renderOrders();
        renderSections();
        renderShippingEditor();
        populateSectionSelect();
        document.getElementById('storeNameInput').value = settings.storeName;
        document.getElementById('taxRateInput').value = settings.taxRate;
    }

    function saveAll() {
        localStorage.setItem('bb_products', JSON.stringify(products));
        localStorage.setItem('bb_sections', JSON.stringify(sections));
        localStorage.setItem('bb_orders', JSON.stringify(orders));
        localStorage.setItem('bb_shipping', JSON.stringify(shippingData));
        localStorage.setItem('bb_settings', JSON.stringify(settings));
        localStorage.setItem('bb_admin_cred', JSON.stringify(adminCred));
        updateStats();
    }

    function updateStats() {
        document.getElementById('ordersCount').innerText = orders.length;
        let total = orders.reduce((sum,o)=>sum+o.total,0);
        document.getElementById('totalSales').innerText = total.toFixed(2);
        let customers = [...new Set(orders.map(o=>o.customer?.phone))].length;
        document.getElementById('customersCount').innerText = customers;
        let salesMap = {};
        orders.forEach(o=>o.items.forEach(it=>{ salesMap[it.name] = (salesMap[it.name]||0)+it.quantity; }));
        let top = Object.entries(salesMap).sort((a,b)=>b[1]-a[1])[0];
        document.getElementById('topProduct').innerText = top ? `${top[0]} (${top[1]})` : "لا توجد مبيعات";
    }

    function renderProducts() {
        let html = `<table><tr><th>صورة</th><th>اسم</th><th>سعر</th><th>قسم</th><th>إجراءات</th></tr>`;
        products.forEach(p => {
            html += `<tr><td><img src="${p.image}" width="50" style="border-radius:12px;"></td><td>${p.name}</td><td><input type="number" id="price-${p.id}" value="${p.price}" style="width:80px;"></td><td>${p.section}</td><td><button onclick="updateProductPrice('${p.id}')">تحديث السعر</button> <button onclick="deleteProduct('${p.id}')" style="background:red;">حذف</button></td></tr>`;
        });
        html += `</table>`;
        document.getElementById('productsList').innerHTML = html;
    }

    window.updateProductPrice = (id) => {
        let newPrice = parseFloat(document.getElementById(`price-${id}`).value);
        let prod = products.find(p=>p.id===id);
        if(prod) { prod.price = newPrice; saveAll(); renderProducts(); showToast("تم تحديث السعر"); }
    };
    window.deleteProduct = (id) => { products = products.filter(p=>p.id!==id); saveAll(); renderProducts(); };

    function renderOrders() {
        let html = `<table><tr><th>رقم الطلب</th><th>العميل</th><th>الإجمالي</th><th>الحالة</th><th>الإجراء</th></tr>`;
        orders.forEach((o,idx) => {
            html += `<tr><td>${o.id}</td><td>${o.customer?.name}</td><td>${o.total} ج.م</td><td><select id="status-${idx}" onchange="changeOrderStatus('${o.id}', this.value)"><option ${o.status==='جديد'?'selected':''}>جديد</option><option ${o.status==='جاري التحضير'?'selected':''}>جاري التحضير</option><option ${o.status==='خرج للتوصيل'?'selected':''}>خرج للتوصيل</option><option ${o.status==='تم التسليم'?'selected':''}>تم التسليم</option></select></td><td><button onclick="viewOrderDetails('${o.id}')">تفاصيل</button></td></tr>`;
        });
        html += `</table>`;
        document.getElementById('ordersList').innerHTML = html;
    }
    window.changeOrderStatus = (orderId, newStatus) => {
        let order = orders.find(o=>o.id===orderId);
        if(order) order.status = newStatus;
        saveAll();
        renderOrders();
        showToast("تم تحديث الحالة");
    };
    window.viewOrderDetails = (id) => { alert(JSON.stringify(orders.find(o=>o.id===id),null,2)); };
    document.getElementById('deleteAllOrdersBtn').onclick = () => { if(confirm("حذف كل الطلبات نهائياً؟")){ orders=[]; saveAll(); renderOrders(); } };

    function renderSections() {
        let html = `<ul>`;
        sections.forEach((sec,idx) => { html += `<li style="margin:8px;">${sec} <button onclick="editSection(${idx})">تعديل</button> <button onclick="deleteSection(${idx})" style="background:red;">حذف</button></li>`; });
        html+=`</ul>`;
        document.getElementById('sectionsList').innerHTML = html;
    }
    window.editSection = (idx) => { let newName = prompt("اسم جديد", sections[idx]); if(newName) { sections[idx]=newName; saveAll(); renderSections(); populateSectionSelect(); }}; 
    window.deleteSection = (idx) => { sections.splice(idx,1); saveAll(); renderSections(); populateSectionSelect(); };
    document.getElementById('addSectionBtn').onclick = () => { let newName=document.getElementById('newSectionName').value; if(newName){ sections.push(newName); saveAll(); renderSections(); populateSectionSelect(); document.getElementById('newSectionName').value=''; }};

    function populateSectionSelect() {
        let select = document.getElementById('prodSection');
        if(select) select.innerHTML = sections.map(s=>`<option>${s}</option>`).join('');
    }
    document.getElementById('addProductBtn').onclick = () => {
        let name = document.getElementById('prodName').value, desc=document.getElementById('prodDesc').value, price=parseFloat(document.getElementById('prodPrice').value), sec=document.getElementById('prodSection').value, file=document.getElementById('prodImage').files[0];
        if(!name || !price) return showToast("الاسم والسعر مطلوبان");
        let reader = new FileReader();
        reader.onload = function(e) {
            let newId = 'p'+Date.now()+Math.random();
            products.push({ id:newId, name, desc, price, section:sec, image: e.target.result || "https://via.placeholder.com/200", rating:4, offerBadge:false, salesCount:0 });
            saveAll(); renderProducts(); showToast("تمت الإضافة");
            document.getElementById('prodName').value=''; document.getElementById('prodDesc').value=''; document.getElementById('prodPrice').value='';
        };
        if(file) reader.readAsDataURL(file);
        else reader.onload({ target:{ result:"https://via.placeholder.com/200"} });
    };

    function renderShippingEditor() {
        let html = ``;
        shippingData.governorates.forEach((gov, gidx) => {
            html += `<div style="border:1px solid #ccc; padding:12px; margin-bottom:12px;"><input value="${gov.name}" id="govName-${gidx}" placeholder="اسم المحافظة"><button onclick="updateGovName(${gidx})">حفظ</button><button onclick="removeGov(${gidx})" style="background:red;">حذف</button><h4>المدن:</h4>`;
            gov.cities.forEach((city, cidx) => {
                html += `<div style="display:flex; gap:8px;"><input value="${city.name}" id="cityName-${gidx}-${cidx}"><input type="number" value="${city.shippingCost}" id="cityCost-${gidx}-${cidx}" placeholder="سعر الشحن"><button onclick="updateCity(${gidx},${cidx})">تحديث</button><button onclick="removeCity(${gidx},${cidx})">حذف</button></div>`;
            });
            html += `<button onclick="addCity(${gidx})">+ إضافة مدينة</button><hr></div>`;
        });
        html += `<button id="addGovBtn">+ إضافة محافظة</button>`;
        document.getElementById('shippingEditor').innerHTML = html;
        document.getElementById('addGovBtn').onclick = () => { shippingData.governorates.push({ id:"gov"+Date.now(), name:"محافظة جديدة", cities:[] }); renderShippingEditor(); };
    }
    window.updateGovName = (idx) => { let newName = document.getElementById(`govName-${idx}`).value; if(newName) shippingData.governorates[idx].name = newName; renderShippingEditor(); };
    window.removeGov = (idx) => { shippingData.governorates.splice(idx,1); renderShippingEditor(); };
    window.updateCity = (gidx, cidx) => { let newName = document.getElementById(`cityName-${gidx}-${cidx}`).value; let newCost = parseFloat(document.getElementById(`cityCost-${gidx}-${cidx}`).value); if(newName) shippingData.governorates[gidx].cities[cidx].name = newName; if(!isNaN(newCost)) shippingData.governorates[gidx].cities[cidx].shippingCost = newCost; renderShippingEditor(); };
    window.removeCity = (gidx,cidx) => { shippingData.governorates[gidx].cities.splice(cidx,1); renderShippingEditor(); };
    window.addCity = (gidx) => { shippingData.governorates[gidx].cities.push({ id:"c"+Date.now(), name:"مدينة جديدة", shippingCost:20 }); renderShippingEditor(); };
    document.getElementById('saveShippingBtn').onclick = () => { saveAll(); showToast("تم حفظ الشحن"); };

    document.getElementById('saveSettingsBtn').onclick = () => { settings.storeName = document.getElementById('storeNameInput').value; settings.taxRate = parseFloat(document.getElementById('taxRateInput').value); saveAll(); showToast("تم حفظ الإعدادات"); };
    document.getElementById('updateCredentialsBtn').onclick = () => { let u=document.getElementById('newAdminUser').value, p=document.getElementById('newAdminPass').value; if(u && p){ adminCred.username=u; adminCred.password=p; saveAll(); showToast("تم تحديث بيانات الدخول"); }};

    // Export & Backup
    document.getElementById('exportExcelBtn').onclick = () => { let csv = "Order ID,Customer,Total,Status\n"+orders.map(o=>`${o.id},${o.customer.name},${o.total},${o.status}`).join("\n"); let blob=new Blob([csv],{type:"text/csv"}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="orders.csv"; a.click(); };
    document.getElementById('exportPdfBtn').onclick = () => { window.print(); };
    document.getElementById('backupDataBtn').onclick = () => { let data={products, sections, orders, shippingData, settings, adminCred}; let blob=new Blob([JSON.stringify(data)],{type:"application/json"}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="burgerbing_backup.json"; a.click(); };
    document.getElementById('restoreDataBtn').onclick = () => { let file=document.getElementById('restoreFileInput').files[0]; if(!file) return; let reader=new FileReader(); reader.onload=e=>{ let backup=JSON.parse(e.target.result); if(backup.products) products=backup.products; if(backup.sections) sections=backup.sections; if(backup.orders) orders=backup.orders; if(backup.shippingData) shippingData=backup.shippingData; if(backup.settings) settings=backup.settings; saveAll(); location.reload(); }; reader.readAsText(file); };

    // Auth
    document.getElementById('loginBtn').onclick = () => { let u=document.getElementById('adminUsername').value, p=document.getElementById('adminPassword').value; if(u===adminCred.username && p===adminCred.password){ document.getElementById('loginContainer').style.display='none'; document.getElementById('dashboardContainer').classList.add('active'); loadAll(); } else alert("بيانات دخول خاطئة"); };
    document.getElementById('logoutBtn').onclick = () => { document.getElementById('loginContainer').style.display='flex'; document.getElementById('dashboardContainer').classList.remove('active'); };
    // Dark mode
    document.getElementById('darkModeToggle').onclick = () => { document.body.classList.toggle('dark'); };
    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.getElementById(btn.dataset.tab+'Tab').classList.add('active'); }; });
    function showToast(msg){ let t=document.createElement('div'); t.innerText=msg; t.style.position='fixed'; t.style.bottom='20px'; t.style.right='20px'; t.style.background='#ff6b00'; t.style.color='white'; t.style.padding='12px'; t.style.borderRadius='40px'; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
</script>
</body>
    </html>
