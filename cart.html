<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة الطلبات - Burger Bing</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="logo"><img id="cart-logo-img" src="https://via.placeholder.com/40?text=BB" alt="Logo"><span id="cart-site-name">Burger Bing</span></div>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
            <a href="cart.html" class="active"><i class="fas fa-shopping-cart"></i> <span>السلة</span> <span id="cart-badge" class="cart-badge">0</span></a>
        </div>
        <div class="mobile-bottom-nav">
            <a href="index.html"><i class="fas fa-utensils"></i><span>منيو</span></a>
            <a href="cart.html" class="active"><i class="fas fa-shopping-cart"></i><span>سلة</span><span id="mobile-cart-badge" class="cart-badge-mobile">0</span></a>
        </div>
    </div>
</nav>

<main class="container cart-page">
    <h1><i class="fas fa-shopping-basket"></i> سلة الطلبات</h1>
    <div id="cart-items-container" class="cart-items"></div>
    
    <div class="cart-summary">
        <div class="summary-card">
            <h3>ملخص الطلب</h3>
            <div class="summary-row"><span>المجموع الفرعي:</span><span id="subtotal">0</span> ج.م</div>
            <div class="summary-row"><span>الضريبة (14%):</span><span id="tax">0</span> ج.م</div>
            <div class="summary-row"><span>الشحن:</span><span id="shipping">0</span> ج.م</div>
            <div class="summary-row discount-row"><span>الخصم:</span><span id="discount">0</span> ج.م</div>
            <div class="summary-row total"><span>الإجمالي:</span><span id="total">0</span> ج.م</div>
        </div>
        
        <div class="coupon-section">
            <input type="text" id="couponCode" placeholder="كود الخصم">
            <button id="applyCoupon">تطبيق</button>
            <div id="couponMsg"></div>
        </div>

        <div class="shipping-section">
            <h3>اختر المحافظة والمدينة</h3>
            <select id="governorateSelect"></select>
            <select id="citySelect"></select>
        </div>

        <div class="customer-form">
            <h3>بيانات العميل</h3>
            <input type="text" id="custName" placeholder="الاسم الكامل" required>
            <input type="tel" id="custPhone" placeholder="رقم الهاتف" required>
            <textarea id="custAddress" placeholder="العنوان بالتفصيل" rows="2"></textarea>
            <textarea id="custNotes" placeholder="ملاحظات إضافية (اختياري)" rows="2"></textarea>
        </div>

        <div class="cart-actions">
            <button id="backToMenu" class="btn-secondary"><i class="fas fa-arrow-right"></i> العودة للمنيو</button>
            <button id="checkoutBtn" class="btn-primary"><i class="fas fa-check-circle"></i> إتمام الطلب</button>
        </div>
    </div>
</main>
<script src="app.js"></script>
<script>
    // عند تحميل الصفحة، استدعاء initCartPage (موجود في app.js)
    document.addEventListener('DOMContentLoaded', () => {
        if(window.initCartPage) window.initCartPage();
    });
</script>
</body>
  </html>
