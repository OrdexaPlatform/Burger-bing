<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برجر بينج | قائمة الطعام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #fef7e8; color: #2d1b0c; }
        .header {
            background: #111; color: #ffb347; padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            position: sticky; top: 0; z-index: 100;
        }
        .logo h1 { font-size: 2rem; }
        .lang-btn {
            background: #ffb347; border: none; padding: 0.6rem 1.5rem; border-radius: 40px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .coupon-bar {
            background: #2c2c2c; padding: 0.8rem 2rem; display: flex; justify-content: center;
            gap: 15px; flex-wrap: wrap; color: white;
        }
        .coupon-bar input { padding: 8px 15px; border-radius: 50px; border: none; width: 220px; }
        .coupon-bar button { background: #ffb347; border: none; padding: 8px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .container { max-width: 1300px; margin: 2rem auto; padding: 0 20px; }
        .category-tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 40px; }
        .cat-btn {
            background: #f0e1cc; border: none; padding: 12px 30px; border-radius: 50px;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .cat-btn.active { background: #ff7e05; color: white; box-shadow: 0 6px 14px rgba(255,126,5,0.3); }
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px;
        }
        .product-card {
            background: white; border-radius: 30px; overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08); transition: 0.25s; cursor: pointer;
        }
        .product-card:hover { transform: translateY(-8px); }
        .product-img { width: 100%; height: 200px; object-fit: cover; background: #f5e2c1; }
        .product-info { padding: 18px; }
        .product-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
        .current-price { font-size: 1.6rem; font-weight: 800; color: #e67e22; }
        .old-price { font-size: 1rem; text-decoration: line-through; color: #aaa; }
        .offer-badge { background: #e63946; color: white; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; }
        footer { text-align: center; padding: 40px; background: #111; color: #ffb347; margin-top: 50px; }
        [dir="ltr"] body { direction: ltr; text-align: left; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1>🍔 برجر بينج <span>Burger Bing</span></h1></div>
        <button class="lang-btn" id="toggleLangBtn"><i class="fas fa-globe"></i> English</button>
    </div>
    <div class="coupon-bar">
        <span><i class="fas fa-tag"></i> <span id="couponLabel">كود خصم</span> :</span>
        <input type="text" id="couponCodeInput" placeholder="أدخل الكود">
        <button id="applyCouponBtn"><i class="fas fa-check"></i> <span id="applyText">تطبيق</span></button>
        <span id="couponMsg"></span>
    </div>
    <div class="container">
        <div class="category-tabs" id="categoryTabs"></div>
        <div class="products-grid" id="productsGrid"></div>
    </div>
    <footer><p>🔥 أفضل برجر في المدينة - استمتع بتجربة فريدة 🔥</p></footer>

    <script>
        let menuData = { categories: [], products: [] };
        let couponsList = [];
        let currentLang = localStorage.getItem('burger_lang') || 'ar';
        let activeCategoryId = null;
        let currentDiscount = 0;

        const translations = {
            ar: { couponLabel: "كود خصم", applyText: "تطبيق", noProducts: "🚫 لا توجد منتجات", offerBadge: "عرض خاص" },
            en: { couponLabel: "Coupon Code", applyText: "Apply", noProducts: "🚫 No products", offerBadge: "Special Offer" }
        };

        function loadData() {
            let storedMenu = localStorage.getItem('burger_menu_data');
            if(storedMenu) menuData = JSON.parse(storedMenu);
            else {
                menuData = {
                    categories: [
                        { id: "cat1", name_ar: "🍔 برجر كلاسيك", name_en: "Classic Burgers", order: 1 },
                        { id: "cat2", name_ar: "🍟 أطباق جانبية", name_en: "Sides", order: 2 },
                        { id: "cat3", name_ar: "🥤 مشروبات", name_en: "Drinks", order: 3 }
                    ],
                    products: [
                        { id: "p1", catId: "cat1", name_ar: "برجر دبل تشيز", name_en: "Double Cheeseburger", price: 45, offerPrice: 35, image: "https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=300&h=200&fit=crop", description_ar: "لحم أنجوس + جبنة", description_en: "Angus beef + cheese", isOffer: true },
                        { id: "p2", catId: "cat1", name_ar: "برجر سبايسي", name_en: "Spicy Burger", price: 42, offerPrice: null, image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=300&h=200&fit=crop", description_ar: "صلصة حارة", description_en: "Spicy sauce", isOffer: false },
                        { id: "p3", catId: "cat2", name_ar: "بطاطس بالجبنة", name_en: "Cheese Fries", price: 25, offerPrice: null, image: "https://images.unsplash.com/photo-1585109649139-366815a0d713?w=300&h=200&fit=crop", description_ar: "جبنة شيدر", description_en: "Cheddar cheese", isOffer: false }
                    ]
                };
                saveMenuData();
            }
            let storedCoupons = localStorage.getItem('burger_coupons');
            if(storedCoupons) couponsList = JSON.parse(storedCoupons);
            else couponsList = [{ code: "WELCOME10", discount: 10, type: "percent" }, { code: "BING20", discount: 20, type: "percent" }];
        }
        function saveMenuData() { localStorage.setItem('burger_menu_data', JSON.stringify(menuData)); }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('burger_lang', lang);
            document.body.style.direction = lang === 'ar' ? 'rtl' : 'ltr';
            document.body.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById("couponLabel").innerText = translations[lang].couponLabel;
            document.getElementById("applyText").innerText = translations[lang].applyText;
            renderCategoriesAndProducts();
        }

        function renderCategoriesAndProducts() {
            const catsContainer = document.getElementById("categoryTabs");
            const productsContainer = document.getElementById("productsGrid");
            const sortedCats = [...menuData.categories].sort((a,b)=> (a.order||0)-(b.order||0));
            catsContainer.innerHTML = '';
            sortedCats.forEach(cat => {
                const btn = document.createElement('button');
                btn.classList.add('cat-btn');
                if(activeCategoryId === cat.id) btn.classList.add('active');
                btn.innerText = currentLang === 'ar' ? cat.name_ar : cat.name_en;
                btn.onclick = () => { activeCategoryId = cat.id; renderCategoriesAndProducts(); };
                catsContainer.appendChild(btn);
            });
            if(activeCategoryId === null && sortedCats.length) activeCategoryId = sortedCats[0].id;
            const filtered = menuData.products.filter(p => p.catId === activeCategoryId);
            if(filtered.length === 0) { productsContainer.innerHTML = `<div style="text-align:center;">${translations[currentLang].noProducts}</div>`; return; }
            productsContainer.innerHTML = '';
            filtered.forEach(prod => {
                let finalPrice = prod.isOffer && prod.offerPrice ? prod.offerPrice : prod.price;
                if(currentDiscount > 0) finalPrice = Math.round((finalPrice - (finalPrice * currentDiscount / 100)) * 10) / 10;
                const card = document.createElement('div'); card.className = 'product-card';
                card.innerHTML = `
                    <img class="product-img" src="${prod.image || 'https://placehold.co/400x250/F5A623/white?text=Burger'}" onerror="this.src='https://placehold.co/400x250/F5A623/white?text=🍔'">
                    <div class="product-info">
                        <div class="product-title">${currentLang === 'ar' ? prod.name_ar : prod.name_en}</div>
                        <div class="price-section"><span class="current-price">${finalPrice} ₯</span>${prod.isOffer && prod.offerPrice ? `<span class="old-price">${prod.price} ₯</span><span class="offer-badge">${translations[currentLang].offerBadge}</span>` : ''}</div>
                        <div class="desc">${currentLang === 'ar' ? (prod.description_ar || '') : (prod.description_en || '')}</div>
                    </div>`;
                productsContainer.appendChild(card);
            });
        }

        function applyCoupon(code) {
            const found = couponsList.find(c => c.code.toUpperCase() === code.toUpperCase());
            const msgSpan = document.getElementById("couponMsg");
            if(found) { currentDiscount = found.discount; msgSpan.innerHTML = `✅ خصم ${found.discount}% فعال!`; renderCategoriesAndProducts(); }
            else { msgSpan.innerHTML = `❌ كود غير صالح`; setTimeout(()=> { if(currentDiscount===0) msgSpan.innerHTML = ""; }, 2000); }
        }

        function initFrontend() {
            loadData();
            if(menuData.categories.length) activeCategoryId = menuData.categories[0].id;
            setLanguage(currentLang);
            document.getElementById("toggleLangBtn").onclick = () => setLanguage(currentLang === 'ar' ? 'en' : 'ar');
            document.getElementById("applyCouponBtn").onclick = () => { const code = document.getElementById("couponCodeInput").value.trim(); if(code) applyCoupon(code); };
            const header = document.querySelector('.header');
            const adminLink = document.createElement('a');
            adminLink.href = "admin.html";
            adminLink.style.background = "#222"; adminLink.style.color = "#ffb347"; adminLink.style.padding = "8px 18px";
            adminLink.style.borderRadius = "40px"; adminLink.style.textDecoration = "none"; adminLink.style.fontWeight = "bold";
            adminLink.innerHTML = '<i class="fas fa-user-shield"></i> ' + (currentLang === 'ar' ? 'لوحة الإدارة' : 'Admin');
            header.appendChild(adminLink);
        }
        initFrontend();
    </script>
</body>
  </html>
