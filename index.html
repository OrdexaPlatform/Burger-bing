<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="أشهى البرجر والساندوتشات في مكان واحد - Burger Bing">
    <title>Burger Bing | المنيو الرئيسي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* إضافات خاصة بالـ Splash و Loader */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #000000, #1a1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            flex-direction: column;
            color: white;
            font-size: 2rem;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ff6b00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hide-splash {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="loader"></div>
    <h2>Burger Bing</h2>
    <p>أطيب ما تذوقت...</p>
</div>

<!-- Loader أثناء تحميل المنتجات -->
<div id="page-loader" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; color:white;">
    <div class="loader"></div>
    <p>جاري التحميل...</p>
</div>

<!-- Navbar ثابت -->
<nav class="navbar">
    <div class="nav-container">
        <div class="logo" id="site-logo">
            <img id="logo-img" src="https://via.placeholder.com/40?text=BB" alt="Logo">
            <span id="site-name">Burger Bing</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
            <a href="cart.html"><i class="fas fa-shopping-cart"></i> <span>السلة</span> <span id="cart-badge" class="cart-badge">0</span></a>
        </div>
        <div class="mobile-bottom-nav">
            <a href="index.html" class="active"><i class="fas fa-utensils"></i><span>منيو</span></a>
            <a href="cart.html"><i class="fas fa-shopping-cart"></i><span>سلة</span><span id="mobile-cart-badge" class="cart-badge-mobile">0</span></a>
        </div>
    </div>
</nav>

<!-- زر Floating للسلة -->
<a href="cart.html" class="floating-cart" id="floatingCart">
    <i class="fas fa-shopping-cart"></i>
    <span id="floating-cart-count">0</span>
</a>

<!-- محتوى الصفحة -->
<main class="container">
    <!-- سلايدر -->
    <div class="slider-container">
        <div class="slider" id="mainSlider">
            <div class="slide"><img src="https://picsum.photos/1200/400?random=1" alt="عرض 1"><div class="slide-caption">عرض خاص: برجر دبل ب 99 جنيه</div></div>
            <div class="slide"><img src="https://picsum.photos/1200/400?random=2" alt="عرض 2"><div class="slide-caption">وجبة العائلة ب 199 جنيه</div></div>
            <div class="slide"><img src="https://picsum.photos/1200/400?random=3" alt="عرض 3"><div class="slide-caption">توصيل مجاني للطلبات فوق 300 جنيه</div></div>
        </div>
        <button class="slider-btn prev" id="prevSlide"><i class="fas fa-chevron-right"></i></button>
        <button class="slider-btn next" id="nextSlide"><i class="fas fa-chevron-left"></i></button>
    </div>

    <!-- بانر عروض اليوم -->
    <div class="offer-banner">
        <i class="fas fa-tags"></i> عروض اليوم: خصم 20% على البرجر المشوي | اطلب الآن واحصل على بطاطس مجانية!
    </div>

    <!-- شريط البحث والفلتر -->
    <div class="filter-bar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن وجبتك المفضلة...">
        </div>
        <div class="categories-filter" id="categoriesFilter">
            <!-- سيتم ملؤها بواسطة JS -->
        </div>
    </div>

    <!-- المنتجات الأكثر طلباً -->
    <section class="top-products">
        <h2><i class="fas fa-fire"></i> الأكثر طلباً</h2>
        <div class="products-grid" id="topProductsGrid"></div>
    </section>

    <!-- جميع المنتجات حسب الأقسام -->
    <div id="productsContainer"></div>
</main>

<script src="app.js"></script>
<script>
    // إخفاء splash screen بعد 1.5 ثانية
    setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if(splash) splash.classList.add('hide-splash');
        setTimeout(() => { if(splash) splash.remove(); }, 500);
    }, 1500);
</script>
</body>
</html>
