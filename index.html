<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>بيرجر بينق | بيت البرجر الفاخر</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        :root {
            --primary: #FF6B00;
            --primary-dark: #E55A00;
            --dark: #111111;
            --light: #FFFFFF;
            --gray-bg: #F8F9FA;
            --glass: rgba(255, 255, 255, 0.2);
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
            --border-radius: 24px;
        }
        body {
            background: var(--gray-bg);
            color: var(--dark);
            transition: all 0.3s ease;
        }
        /* Glassmorphism & Neumorphism Elements */
        .glass-card, .product-card, .category-btn, .navbar, .cart-sidebar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .product-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        button, .btn {
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        button:hover {
            background: var(--primary-dark);
            transform: scale(0.97);
        }
        /* RTL & Modern */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(16px);
            color: white;
        }
        .logo h1 { color: var(--primary); font-size: 1.8rem; }
        .cart-icon {
            background: var(--primary);
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
        }
        /* Slider */
        .slider-container {
            margin: 20px;
            overflow: hidden;
            border-radius: 32px;
            position: relative;
        }
        .slider {
            display: flex;
            transition: 0.5s;
        }
        .slider img {
            width: 100%;
            min-width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 32px;
        }
        /* Search & Filter */
        .search-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px;
            justify-content: center;
        }
        #searchInput {
            padding: 12px 20px;
            border-radius: 40px;
            border: none;
            width: 250px;
            background: white;
            box-shadow: var(--shadow);
        }
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            padding: 16px;
        }
        .category-btn {
            padding: 8px 18px;
            background: white;
            color: black;
            font-weight: 600;
        }
        .category-btn.active {
            background: var(--primary);
            color: white;
        }
        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            padding: 24px;
        }
        .product-card {
            padding: 16px;
            position: relative;
        }
        .badge-offer {
            position: absolute;
            top: 12px;
            right: 12px;
            background: red;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .product-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 20px;
            background: #ddd;
        }
        .price { color: var(--primary); font-size: 1.4rem; font-weight: 800; }
        .rating { color: gold; margin: 6px 0; }
        /* Side Cart */
        .cart-sidebar {
            position: fixed;
            top: 0;
            left: -450px;
            width: 450px;
            height: 100vh;
            background: white;
            z-index: 1000;
            transition: 0.3s;
            padding: 20px;
            overflow-y: auto;
            box-shadow: -5px 0 30px rgba(0,0,0,0.3);
        }
        .cart-sidebar.open {
            left: 0;
        }
        .overlay {
            position: fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background: rgba(0,0,0,0.5);
            visibility: hidden;
            z-index: 999;
        }
        .overlay.active { visibility: visible; }
        /* Toast */
        .toast-notify {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 2000;
            animation: fadeUp 0.3s;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
        /* modal checkout */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            width: 90%;
            max-width: 500px;
            z-index: 1100;
            border-radius: 32px;
            padding: 24px;
            display: none;
        }
        .modal.active { display: block; }
        @media (max-width: 768px) {
            .cart-sidebar { width: 100%; left: -100%; }
            .navbar { padding: 12px; }
            .products-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
        }
        .floating-cart {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--primary);
            width: 56px;
            height: 56px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 99;
        }
        /* splash screen */
        .splash {
            position: fixed;
            width:100%;
            height:100%;
            background: black;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 2rem;
            transition: 0.5s;
        }
    </style>
</head>
<body>

<div class="splash" id="splashScreen">
    <div><i class="fas fa-hamburger"></i> Burger Bing <div class="spinner-border"></div></div>
</div>

<nav class="navbar">
    <div class="logo"><h1>🍔 Burger Bing</h1></div>
    <div>
        <button id="openCartBtn" class="cart-icon"><i class="fas fa-shopping-cart"></i> السلة (<span id="cartCount">0</span>)</button>
        <a href="admin.html" style="color:white; margin-right:12px;"><i class="fas fa-crown"></i> Admin</a>
    </div>
</nav>

<div class="slider-container">
    <div class="slider" id="slider">
        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600" alt="burger">
        <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d?w=600" alt="meal">
        <img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=600" alt="fries">
    </div>
</div>

<div class="search-filter">
    <input type="text" id="searchInput" placeholder="🔍 ابحث عن برجر أو وجبة...">
</div>
<div class="categories" id="categoriesContainer"></div>

<div class="products-grid" id="productsContainer"></div>

<!-- Side cart -->
<div class="overlay" id="overlay"></div>
<div class="cart-sidebar" id="cartSidebar">
    <div style="display: flex; justify-content: space-between;"><h3>🛒 سلة الطلبات</h3><button id="closeCartBtn"><i class="fas fa-times"></i></button></div>
    <div id="cartItemsList"></div>
    <div id="cartSummary"></div>
    <div>
        <label>كود الخصم:</label>
        <input type="text" id="couponCodeInput" placeholder="خصم 10%">
        <button id="applyCouponBtn">تطبيق</button>
    </div>
    <div>
        <label>المحافظة:</label>
        <select id="governorateSelect"></select>
        <label>المدينة:</label>
        <select id="citySelect"></select>
    </div>
    <button id="checkoutBtn" style="width:100%; margin-top:16px;">إتمام الطلب</button>
</div>

<!-- Checkout Modal -->
<div id="checkoutModal" class="modal">
    <h3>📝 بيانات العميل</h3>
    <input type="text" id="custName" placeholder="الاسم الكامل" style="width:100%; margin:8px 0; padding:10px;">
    <input type="tel" id="custPhone" placeholder="رقم الهاتف" style="width:100%; margin:8px 0; padding:10px;">
    <input type="text" id="custAddress" placeholder="العنوان التفصيلي" style="width:100%; margin:8px 0; padding:10px;">
    <textarea id="custNotes" placeholder="ملاحظات اضافية"></textarea>
    <button id="confirmOrderBtn">تأكيد الطلب</button>
    <button id="closeModalBtn" style="background:gray;">إلغاء</button>
</div>

<div class="floating-cart" id="floatingCartBtn"><i class="fas fa-shopping-bag"></i></div>

<script>
    // ---------- GLOBALS ----------
    let products = [];
    let sections = [];
    let cart = [];
    let orders = [];
    let shippingData = { governorates: [] };
    let coupons = [];
    let settings = { storeName: "Burger Bing", taxRate: 14, logo: "" };
    let appliedCoupon = null;
    let selectedGovId = "", selectedCityId = "";

    // Helpers
    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast-notify';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }
    function saveAllData() {
        localStorage.setItem('bb_products', JSON.stringify(products));
        localStorage.setItem('bb_sections', JSON.stringify(sections));
        localStorage.setItem('bb_cart', JSON.stringify(cart));
        localStorage.setItem('bb_orders', JSON.stringify(orders));
        localStorage.setItem('bb_shipping', JSON.stringify(shippingData));
        localStorage.setItem('bb_coupons', JSON.stringify(coupons));
        localStorage.setItem('bb_settings', JSON.stringify(settings));
    }
    function loadData() {
        products = JSON.parse(localStorage.getItem('bb_products') || '[]');
        sections = JSON.parse(localStorage.getItem('bb_sections') || '[]');
        let savedCart = localStorage.getItem('bb_cart');
        cart = savedCart ? JSON.parse(savedCart) : [];
        orders = JSON.parse(localStorage.getItem('bb_orders') || '[]');
        shippingData = JSON.parse(localStorage.getItem('bb_shipping') || JSON.stringify({
            governorates: [
                { id: "gov1", name: "القاهرة", cities: [{ id: "cit1", name: "مدينة نصر", shippingCost: 30 }, { id: "cit2", name: "مصر الجديدة", shippingCost: 35 }] },
                { id: "gov2", name: "الإسكندرية", cities: [{ id: "cit3", name: "وسط", shippingCost: 45 }, { id: "cit4", name: "سموحة", shippingCost: 40 }] },
                { id: "gov3", name: "الجيزة", cities: [{ id: "cit5", name: "المهندسين", shippingCost: 30 }, { id: "cit6", name: "الشيخ زايد", shippingCost: 50 }] }
            ]
        }));
        coupons = JSON.parse(localStorage.getItem('bb_coupons') || '[{"code":"WELCOME10","discount":10,"type":"percent"}]');
        settings = JSON.parse(localStorage.getItem('bb_settings') || '{"taxRate":14}');
        if(products.length === 0) initializeDefaultData();
        updateCartCount();
    }
    function initializeDefaultData() {
        sections = ["البرجر", "الساندوتشات", "الوجبات", "البطاطس", "المقبلات", "المشروبات", "الصوصات", "الحلويات"];
        products = [
            { id: "p1", name: "دبل تشيز برجر", desc: "جبنة مضاعفة و لحم", price: 85, section: "البرجر", image: "https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=200", rating: 4.8, offerBadge: true, salesCount: 12 },
            { id: "p2", name: "برجر كلاسيك", desc: "طماطم وخس", price: 65, section: "البرجر", image: "https://images.unsplash.com/photo-1551782450-1713b4fc2b72?w=200", rating: 4.5, offerBadge: false, salesCount: 8 },
            { id: "p3", name: "ساندوتش فراخ", desc: "صوص مميز", price: 55, section: "الساندوتشات", image: "https://images.unsplash.com/photo-1606755962773-d324e0a1304e?w=200", rating: 4.6, offerBadge: false, salesCount: 5 },
            { id: "p4", name: "وجبة عائلة", desc: "برجر+بطاطس+بيبسي", price: 180, section: "الوجبات", image: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=200", rating: 4.9, offerBadge: true, salesCount: 20 },
            { id: "p5", name: "بطاطس حراقة", desc: "حارة ولذيذة", price: 25, section: "البطاطس", image: "https://images.unsplash.com/photo-1630384060421-cf20c0e0dbb2?w=200", rating: 4.7, offerBadge: false, salesCount: 30 },
            { id: "p6", name: "صوص ثوم", desc: "صلصة ثوم", price: 10, section: "الصوصات", image: "https://cdn-icons-png.flaticon.com/512/1046/1046784.png", rating: 4.4, offerBadge: false, salesCount: 44 },
            { id: "p7", name: "كوكاكولا", desc: "مشروب غازي", price: 12, section: "المشروبات", image: "https://images.unsplash.com/photo-1629203851122-3726ecdf080e?w=200", rating: 4.3, offerBadge: false, salesCount: 55 },
            { id: "p8", name: "كنافة", desc: "حلى شرقي", price: 40, section: "الحلويات", image: "https://images.unsplash.com/photo-1601050690597-df0568f70950?w=200", rating: 4.9, offerBadge: false, salesCount: 9 }
        ];
        saveAllData();
    }
    function updateCartCount() { document.getElementById('cartCount').innerText = cart.reduce((a,i)=>a+i.quantity,0); localStorage.setItem('bb_cart', JSON.stringify(cart)); }
    function renderCategories(activeSection = "الكل") {
        let catsHtml = `<button class="category-btn ${activeSection === 'الكل' ? 'active' : ''}" data-cat="الكل">الكل</button>`;
        sections.forEach(sec => { catsHtml += `<button class="category-btn ${activeSection === sec ? 'active' : ''}" data-cat="${sec}">${sec}</button>`; });
        document.getElementById('categoriesContainer').innerHTML = catsHtml;
        document.querySelectorAll('.category-btn').forEach(btn => btn.addEventListener('click', (e) => { renderCategories(e.target.dataset.cat); filterProducts(e.target.dataset.cat); }));
    }
    function filterProducts(category, searchTerm = "") {
        let filtered = products.filter(p => (category === 'الكل' || p.section === category) && p.name.includes(searchTerm));
        let html = filtered.map(p => `
            <div class="product-card">
                ${p.offerBadge ? '<span class="badge-offer">عرض خاص</span>' : ''}
                <img class="product-img" src="${p.image}" onerror="this.src='https://via.placeholder.com/200?text=Burger'">
                <h3>${p.name}</h3>
                <p>${p.desc}</p>
                <div class="rating">${'★'.repeat(Math.floor(p.rating))}${p.rating%1>=0.5?'☆':''}</div>
                <div class="price">${p.price} ج.م</div>
                <button onclick="addToCart('${p.id}')"><i class="fas fa-cart-plus"></i> أضف للسلة</button>
            </div>`).join('');
        document.getElementById('productsContainer').innerHTML = html;
    }
    window.addToCart = (id) => {
        let product = products.find(p=>p.id===id);
        let existing = cart.find(i=>i.id===id);
        if(existing) existing.quantity++;
        else cart.push({id: product.id, name: product.name, price: product.price, quantity: 1, image: product.image});
        updateCartCount(); renderCartSidebar(); showToast(`✅ تم إضافة ${product.name}`);
        saveAllData();
    };
    function renderCartSidebar() {
        let itemsHtml = cart.map((item, idx) => `<div style="display:flex; gap:12px; align-items:center; margin-bottom:12px;"><img src="${item.image}" width="50" height="50" style="border-radius:12px;"><div><strong>${item.name}</strong><br>${item.price} ج.م</div><div style="margin-right:auto;"><button onclick="changeQty('${item.id}', -1)">-</button> ${item.quantity} <button onclick="changeQty('${item.id}', 1)">+</button><button onclick="removeCartItem('${item.id}')" style="background:red;">حذف</button></div></div>`).join('');
        document.getElementById('cartItemsList').innerHTML = itemsHtml || "<p>السلة فارغة</p>";
        updateCartSummary();
    }
    window.changeQty = (id, delta) => {
        let idx = cart.findIndex(i=>i.id===id);
        if(idx !== -1){
            let newQty = cart[idx].quantity + delta;
            if(newQty <= 0) cart.splice(idx,1);
            else cart[idx].quantity = newQty;
            updateCartCount(); renderCartSidebar(); saveAllData();
        }
    };
    window.removeCartItem = (id) => { cart = cart.filter(i=>i.id!==id); updateCartCount(); renderCartSidebar(); saveAllData(); };
    function updateCartSummary() {
        let subtotal = cart.reduce((s,i)=>s+(i.price*i.quantity),0);
        let tax = subtotal * (settings.taxRate / 100);
        let shippingCost = getSelectedShippingCost();
        let discount = 0;
        if(appliedCoupon){
            discount = subtotal * (appliedCoupon.discount / 100);
        }
        let total = subtotal + tax + shippingCost - discount;
        document.getElementById('cartSummary').innerHTML = `<div>المجموع: ${subtotal} ج.م</div><div>الضريبة: ${tax.toFixed(2)} ج.م</div><div>الشحن: ${shippingCost} ج.م</div><div>الخصم: -${discount.toFixed(2)} ج.م</div><hr><h3>الإجمالي: ${total.toFixed(2)} ج.م</h3>`;
    }
    function getSelectedShippingCost(){
        if(!selectedGovId || !selectedCityId) return 0;
        let gov = shippingData.governorates.find(g=>g.id === selectedGovId);
        if(gov){
            let city = gov.cities.find(c=>c.id === selectedCityId);
            return city ? city.shippingCost : 0;
        }
        return 0;
    }
    function loadShippingSelects(){
        let govSelect = document.getElementById('governorateSelect');
        govSelect.innerHTML = '<option>اختر المحافظة</option>';
        shippingData.governorates.forEach(gov => {
            let opt = document.createElement('option');
            opt.value = gov.id;
            opt.innerText = gov.name;
            govSelect.appendChild(opt);
        });
        govSelect.onchange = (e) => {
            selectedGovId = e.target.value;
            let citySelect = document.getElementById('citySelect');
            let govObj = shippingData.governorates.find(g=>g.id === selectedGovId);
            citySelect.innerHTML = '<option>اختر المدينة</option>';
            if(govObj){
                govObj.cities.forEach(city => {
                    let opt = document.createElement('option');
                    opt.value = city.id;
                    opt.innerText = `${city.name} (شحن ${city.shippingCost} ج.م)`;
                    citySelect.appendChild(opt);
                });
            }
        };
        document.getElementById('citySelect').onchange = (e) => { selectedCityId = e.target.value; updateCartSummary(); };
    }
    document.getElementById('applyCouponBtn')?.addEventListener('click',()=>{
        let code = document.getElementById('couponCodeInput').value;
        let found = coupons.find(c=>c.code === code);
        if(found){ appliedCoupon = found; showToast(`خصم ${found.discount}% تم تطبيقه`); updateCartSummary();}
        else { showToast("كود غير صالح"); appliedCoupon = null; updateCartSummary(); }
    });
    function placeOrder(customer){
        if(cart.length === 0) { showToast("السلة فارغة!"); return; }
        let subtotal = cart.reduce((s,i)=>s+(i.price*i.quantity),0);
        let tax = subtotal * (settings.taxRate/100);
        let shipping = getSelectedShippingCost();
        let disc = appliedCoupon ? subtotal*(appliedCoupon.discount/100):0;
        let total = subtotal+tax+shipping-disc;
        let orderId = "ORD-" + Date.now();
        let newOrder = { id: orderId, customer, items: [...cart], subtotal, tax, shipping, discount: disc, total, status: "جديد", date: new Date().toISOString() };
        orders.unshift(newOrder);
        // update product salesCount
        cart.forEach(citem => {
            let prod = products.find(p=>p.id === citem.id);
            if(prod) prod.salesCount = (prod.salesCount||0) + citem.quantity;
        });
        cart = [];
        appliedCoupon = null;
        updateCartCount(); renderCartSidebar();
        saveAllData();
        showToast(`🎉 تم إتمام الطلب رقم ${orderId}`);
        document.getElementById('checkoutModal').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
        document.getElementById('cartSidebar').classList.remove('open');
    }
    // Event Listeners & UI
    document.getElementById('openCartBtn').onclick = () => { document.getElementById('cartSidebar').classList.add('open'); document.getElementById('overlay').classList.add('active'); renderCartSidebar(); };
    document.getElementById('closeCartBtn').onclick = () => { document.getElementById('cartSidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); };
    document.getElementById('floatingCartBtn').onclick = () => { document.getElementById('cartSidebar').classList.add('open'); document.getElementById('overlay').classList.add('active'); };
    document.getElementById('overlay').onclick = () => { document.getElementById('cartSidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); };
    document.getElementById('checkoutBtn').onclick = () => {
        if(cart.length===0){ showToast("أضف منتجات أولاً"); return; }
        document.getElementById('checkoutModal').classList.add('active');
        document.getElementById('overlay').classList.add('active');
    };
    document.getElementById('confirmOrderBtn').onclick = () => {
        let name = document.getElementById('custName').value;
        let phone = document.getElementById('custPhone').value;
        let address = document.getElementById('custAddress').value;
        let notes = document.getElementById('custNotes').value;
        if(!name || !phone){ showToast("الاسم والهاتف مطلوبين"); return; }
        placeOrder({ name, phone, address, notes });
    };
    document.getElementById('closeModalBtn').onclick = () => { document.getElementById('checkoutModal').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); };
    document.getElementById('searchInput').addEventListener('input', (e)=>{ filterProducts('الكل', e.target.value); });
    // Splash screen
    setTimeout(()=>{ document.getElementById('splashScreen').style.opacity='0'; setTimeout(()=>{document.getElementById('splashScreen').style.display='none';},500); }, 1500);
    // Auto slider
    let slideIndex=0, slides=document.querySelectorAll('.slider img');
    function autoSlide(){ slideIndex=(slideIndex+1)%slides.length; document.querySelector('.slider').style.transform=`translateX(-${slideIndex*100}%)`; }
    setInterval(autoSlide, 4000);
    // initial load
    loadData();
    renderCategories('الكل');
    filterProducts('الكل', '');
    loadShippingSelects();
    renderCartSidebar();
